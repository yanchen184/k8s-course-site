<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K8s 第六堂 — 複習筆記</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #63b3ed;
      white-space: nowrap;
    }

    /* ── Tab bar ── */
    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }
    .tab {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #2d3748;
      background: transparent;
      color: #94a3b8;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab:hover { background: #1e2535; color: #e2e8f0; }
    .tab.active {
      background: #2b4c7e;
      border-color: #63b3ed;
      color: #63b3ed;
      font-weight: 600;
    }

    /* ── Content ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    #content {
      line-height: 1.75;
    }

    /* markdown styles */
    #content h1 { font-size: 1.6rem; color: #63b3ed; margin: 0 0 8px; border-bottom: 1px solid #2d3748; padding-bottom: 8px; }
    #content h2 { font-size: 1.2rem; color: #9ae6b4; margin: 32px 0 12px; }
    #content h3 { font-size: 1rem; color: #fbd38d; margin: 24px 0 8px; }
    #content h4 { font-size: 0.95rem; color: #e9d8fd; margin: 16px 0 6px; }
    #content p { margin: 8px 0; color: #cbd5e0; }
    #content ul, #content ol { padding-left: 1.5rem; margin: 8px 0; }
    #content li { margin: 4px 0; color: #cbd5e0; }
    #content strong { color: #fff; }
    #content em { color: #b794f4; }
    #content code {
      background: #1a2235;
      color: #68d391;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: "Fira Code", "Consolas", monospace;
      font-size: 0.88em;
    }
    #content pre {
      background: #141820;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
      overflow-x: auto;
    }
    #content pre code {
      background: none;
      padding: 0;
      color: #a0d9b4;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    #content blockquote {
      border-left: 3px solid #63b3ed;
      padding-left: 12px;
      margin: 12px 0;
      color: #94a3b8;
      font-style: italic;
    }
    #content hr {
      border: none;
      border-top: 1px solid #2d3748;
      margin: 24px 0;
    }
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 0.9rem;
    }
    #content th {
      background: #1a2235;
      color: #63b3ed;
      padding: 8px 12px;
      text-align: left;
      border: 1px solid #2d3748;
    }
    #content td {
      padding: 7px 12px;
      border: 1px solid #2d3748;
      color: #cbd5e0;
    }
    #content tr:nth-child(even) td { background: #141820; }

    /* loading */
    .loading { color: #4a5568; text-align: center; padding: 60px; font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <h1>K8s 第六堂複習</h1>
  <nav class="tabs" id="tabs"></nav>
  <a href="index.html" style="margin-left:auto;color:#f6ad55;font-size:0.78rem;text-decoration:none;padding:5px 12px;border:1px solid #744210;border-radius:6px;white-space:nowrap;flex-shrink:0;">← 第五堂</a>
</header>

<main>
  <div id="content"><div class="loading">載入中…</div></div>
</main>

<script>
  const DOCS = [
    { label: 'Loop 1 Ingress',              file: '../docs/day6-loop1-ingress.md' },
    { label: 'Loop 2 ConfigMap + Secret',   file: '../docs/day6-loop2-configmap-secret.md' },
    { label: 'Loop 3 整合實作',             file: '../docs/day6-loop3-integration.md' },
    { label: 'Loop 4 PV + PVC',             file: '../docs/day6-loop4-pv-pvc.md' },
    { label: 'Loop 5 StatefulSet',          file: '../docs/day6-loop5-statefulset.md' },
    { label: 'Loop 6 Helm',                 file: '../docs/day6-loop6-helm.md' },
    { label: 'Loop 7 Rancher',              file: '../docs/day6-loop7-rancher.md' },
    { label: 'Loop 8 綜合 + 總結',          file: '../docs/day6-loop8-final.md' },
    { label: '📋 投影片地圖',               file: '../docs/day6-slide-map.md' },
  ];

  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');
  let current = 0;

  DOCS.forEach((doc, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = doc.label;
    btn.onclick = () => loadDoc(i);
    tabsEl.appendChild(btn);
  });

  async function loadDoc(i) {
    current = i;
    document.querySelectorAll('.tab').forEach((t, idx) => {
      t.classList.toggle('active', idx === i);
    });
    contentEl.innerHTML = '<div class="loading">載入中…</div>';
    try {
      const res = await fetch(DOCS[i].file);
      if (!res.ok) throw new Error(res.status);
      const md = await res.text();
      contentEl.innerHTML = marked.parse(md);
      window.scrollTo(0, 0);
    } catch (e) {
      contentEl.innerHTML = '<div class="loading">載入失敗：' + e.message + '</div>';
    }
  }

  loadDoc(0);
</script>
</body>
</html>
