# k3s (Traefik) 版本
# 如果是 minikube + ingress-nginx，把 ingressClassName 改成 nginx
# 並移除 annotations 的 traefik middleware
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tasks-ingress
  namespace: tasks
  annotations:
    # Traefik: strip /api prefix 再轉給 backend
    traefik.ingress.kubernetes.io/router.middlewares: tasks-strip-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: task.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
---
# Traefik Middleware：把 /api prefix 剝掉
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: tasks
spec:
  stripPrefix:
    prefixes:
      - /api
