name: Build and Push Task Apps

on:
  push:
    branches: [master]
    paths:
      - 'apps/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: yanchen184

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        app: [task-api, task-runner, task-scheduler, task-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.app }}:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
