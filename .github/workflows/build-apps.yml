name: Build and Push Task Apps

on:
  push:
    branches: [master]
    paths:
      - 'apps/**'
  workflow_dispatch:

env:
  OWNER: yanchen184

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - app: task-api
            version: v2
          - app: task-runner
            version: v1
          - app: task-scheduler
            version: v1
          - app: task-frontend
            version: v1

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.OWNER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.OWNER }}/${{ matrix.app }}:latest
            ${{ env.OWNER }}/${{ matrix.app }}:${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
